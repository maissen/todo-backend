name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
    branches:
      - main

jobs:
  CI-build-and-test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Set image tag based on commit sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: |
            ${{vars.ECR_REGISTRY}}/${{vars.IMAGE_NAME}}:latest
            ${{vars.ECR_REGISTRY}}/${{vars.IMAGE_NAME}}:${{env.SHORT_SHA}}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{vars.ECR_REGISTRY}}/${{vars.IMAGE_NAME}}:${{env.SHORT_SHA}}'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  CI-status:
    needs: [CI-build-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - run: |
        if [[ "${{ needs.CI-build-and-test.result }}" == "skipped" ]]; then
          echo "CI skipped"
        elif [[ "${{ needs.CI-build-and-test.result }}" == "success" ]]; then
          echo "CI passed"
        else
          echo "CI failed"
          exit 1
        fi