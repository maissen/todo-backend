name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ !steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**.md'

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Set image tag based on commit sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: |
            ${{vars.ECR_REGISTRY}}/${{vars.IMAGE_NAME}}:latest
            ${{vars.ECR_REGISTRY}}/${{vars.IMAGE_NAME}}:${{env.SHORT_SHA}}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{vars.ECR_REGISTRY}}/${{vars.IMAGE_NAME}}:${{env.SHORT_SHA}}'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  CI-status:
    needs: [changes, build-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report CI result
        run: |
          if [[ "${{ needs.changes.outputs.code_changed }}" != "true" ]]; then
            echo "CI skipped: docs-only change"
            exit 0
          fi

          if [[ "${{ needs.build-and-test.result }}" == "success" ]]; then
            echo "CI passed"
          else
            echo "CI failed"
            exit 1
          fi
