name: Lint

on:
  pull_request:
    branches:
      - main

jobs:
  python-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff black

      - name: Run Ruff linter
        run: ruff check .

      - name: Run black format checker
        run: black --check .
