name: CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.filter.outputs.deployable }}
    steps:
      - uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            deployable:
              - '**.py'
              - 'Dockerfile'
              - '*-template.json'
              - 'requirements*.txt'

  build-and-push:
    needs: changes
    if: needs.changes.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tag based on commit sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::339712707627:role/GithubActionRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image and push to ECR
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:latest
            ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.SHORT_SHA }}

  deploy-staging:
    needs: [changes, build-and-push]
    if: needs.changes.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.maissen.com
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tag based on commit sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::339712707627:role/GithubActionRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECS task definition
        run: |
          jq --arg IMG "${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.SHORT_SHA }}" \
            '.containerDefinitions[0].image=$IMG' task-definition-staging-template.json > task-definition.json

      - name: Deploy to staging ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          service: ${{ vars.STAGING_ECS_SERVICE }}
          cluster: ${{ vars.STAGING_ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-prod:
    needs: [changes, deploy-staging]
    if: needs.changes.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://maissen.com
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tag based on commit sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::339712707627:role/GithubActionRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECS task definition
        run: |
          jq --arg IMG "${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.SHORT_SHA }}" \
            '.containerDefinitions[0].image=$IMG' task-definition-prod-template.json > task-definition.json

      - name: Deploy to prod ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          service: ${{ vars.PROD_ECS_SERVICE }}
          cluster: ${{ vars.PROD_ECS_CLUSTER }}
          wait-for-service-stability: true